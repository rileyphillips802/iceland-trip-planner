<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland Ring Road — Trip Map · Aug 14–18</title>
<style>
  :root{
    --basalt:#0f1419; --card:#161b22; --bone:#eceae4; --bone-dim:#9aa0a8;
    --glacier:#7fb8d6; --aurora:#6fd39a; --star:#f5b942; --warn:#e0a45e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--basalt);color:var(--bone);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;}
  #map{position:absolute;inset:0;background:#0b1a2b;}

  .daytabs{position:absolute;z-index:30;top:18px;left:18px;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(58% - 36px);}
  .daytab{font-size:.92rem;font-weight:600;background:rgba(20,25,33,.78);color:var(--bone);
    border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:.5rem 1.1rem;cursor:pointer;
    backdrop-filter:blur(10px);transition:all .15s;white-space:nowrap;}
  .daytab:hover{background:rgba(40,48,58,.9);}
  .daytab.active{background:#f4f2ec;color:#11161c;border-color:#f4f2ec;}

  /* FIXED-GEOMETRY CARD: header(photo) + scrollable body + pinned footer */
  .card{position:absolute;z-index:30;top:18px;right:18px;
    width:min(420px,42vw); height:min(680px, calc(100vh - 36px));
    display:flex;flex-direction:column;
    background:rgba(22,27,34,.94);border:1px solid rgba(255,255,255,.08);border-radius:20px;
    backdrop-filter:blur(16px);box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden;}
  @media(max-width:760px){.card{width:calc(100vw - 28px);right:14px;left:14px;top:auto;bottom:14px;height:70vh;}
    .daytabs{max-width:calc(100% - 36px);}}

  /* photo banner — FIXED height so card never grows */
  .ph{position:relative;width:100%;height:236px;flex:none;background:#0e1318;overflow:hidden;}
  .ph .img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .35s;}
  .ph .img.on{opacity:1;}
  .ph .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:6px;justify-content:center;z-index:2;}
  .ph .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);transition:all .2s;}
  .ph .dot.on{background:#fff;width:7px;height:7px;}
  .ph .close{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border:none;cursor:pointer;
    border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:19px;line-height:32px;text-align:center;}
  .ph .nav{position:absolute;top:0;bottom:0;width:34%;z-index:2;cursor:pointer;background:transparent;border:none;}
  .ph .nav.l{left:0;} .ph .nav.r{right:0;}

  /* scrollable middle */
  .cb{flex:1 1 auto;padding:1.05rem 1.3rem 1.2rem;overflow-y:auto;min-height:0;}
  .cb::-webkit-scrollbar{width:6px;} .cb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
  .meta{font-size:.78rem;letter-spacing:.04em;color:var(--bone-dim);text-transform:uppercase;}
  .ttl{font-size:1.5rem;font-weight:700;line-height:1.14;margin:.35rem 0 .5rem;letter-spacing:-.01em;}
  .rate{font-size:.95rem;color:var(--bone-dim);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .rate .num{color:var(--bone);font-weight:700;} .rate .star{color:var(--star);}
  .note{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:.85rem 1rem;margin-top:1rem;}
  .note .lbl{font-size:.82rem;color:var(--bone-dim);margin-bottom:.35rem;}
  .note .txt{font-size:.96rem;line-height:1.5;}
  .gmlink{display:block;text-align:right;margin-top:.7rem;font-size:.82rem;color:var(--glacier);text-decoration:none;}
  .gmlink:hover{text-decoration:underline;}

  /* plain inline time line on stop card + sunrise/sunset on day intro */
  .timeline{font-size:.86rem;color:var(--bone-dim);margin:.9rem 0 .2rem;}
  .timeline strong{color:var(--bone);font-weight:700;}
  .suntime{font-size:.86rem;color:var(--star);margin:.2rem 0 1rem;}
  .suntime strong{color:var(--bone);font-weight:700;}

  /* drive gap rows in the intro stop list */
  .drivegap{display:flex;align-items:center;gap:.5rem;padding:.25rem 0 .25rem 1.1rem;
    font-size:.78rem;color:var(--bone-dim);}
  .drivegap::before{content:"";width:2px;height:18px;background:rgba(255,255,255,.15);margin-left:25px;margin-right:.7rem;}
  .mt .stay{color:var(--aurora);} .mt .stay.tight{color:var(--warn);}

  .intro .narr{font-size:1.02rem;line-height:1.5;color:var(--bone-dim);margin:.6rem 0 1rem;}
  .openroute{display:inline-flex;align-items:center;gap:.5rem;background:#f4f2ec;color:#11161c;font-weight:700;
    font-size:.95rem;border:none;border-radius:999px;padding:.6rem 1.15rem;cursor:pointer;text-decoration:none;}
  .openroute:hover{background:#fff;}
  .drivepill{font-size:.84rem;color:var(--aurora);margin-top:.9rem;}
  .section-h{font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--bone-dim);margin:1.3rem 0 .2rem;}
  .mini{display:flex;gap:.8rem;align-items:center;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;}
  .mini:last-child{border-bottom:none;} .mini:hover .mn{color:var(--glacier);}
  .mini .mthumb{width:54px;height:54px;border-radius:11px;flex:none;background:#0e1318 center/cover;background-size:cover;}
  .mini .mt{font-size:.78rem;color:var(--bone-dim);} .mn{font-size:1rem;font-weight:600;line-height:1.2;}

  /* footer pinned, fixed height */
  .fnav{flex:none;height:64px;display:flex;align-items:center;justify-content:space-between;gap:.6rem;
    padding:0 1.1rem;border-top:1px solid rgba(255,255,255,.08);background:rgba(14,18,24,.8);}
  .fbtn{min-width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.13);
    background:rgba(255,255,255,.05);color:var(--bone);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;
    justify-content:center;padding:0 .9rem;font-weight:600;}
  .fbtn:hover{background:rgba(255,255,255,.12);} .fbtn:disabled{opacity:.3;cursor:default;}
  .fbtn.daybtn{font-size:.9rem;} .fcount{font-size:.95rem;color:var(--bone-dim);font-weight:700;}

  .pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;}
  .pin .thumb{width:46px;height:46px;border-radius:13px;border:2.5px solid #fff;background:#1c222b center/cover;
    background-size:cover;box-shadow:0 4px 12px rgba(0,0,0,.55);transition:all .15s;}
  .pin .badge{position:absolute;top:-9px;right:-9px;min-width:22px;height:22px;border-radius:999px;background:#fff;
    color:#11161c;font-size:.74rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;
    border:1.5px solid #11161c;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .pin.active .thumb{border-color:var(--aurora);width:54px;height:54px;}
</style>
</head>
<body>
<div id="map"></div>
<div class="daytabs" id="daytabs"></div>
<div class="card" id="card" style="display:none;"></div>

<script>
/* Data is loaded at runtime from trip.json + enrichment.json (see boot() at bottom).
   These are populated before initMap runs. */
let DAYS=[], FLAT=[], TRIP_META=null;
const FALLBACK_DRIVE_MIN=45; // used only if neither live nor stored drive time is known

/* Build the in-memory DAYS structure the rest of the app expects from the two
   loaded JSON files. Maps enrichment onto each stop by name:
     s.pd = {pid,rating,count,cat} | null   (null = no place; rate banner hidden)
     s.photos = [local paths] | []          ([] = empty carousel banner) */
function buildData(trip, enrichment){
  TRIP_META=trip.meta||null;
  DAYS=trip.days.map(d=>({
    n:d.n, title:d.title, date:d.date, narr:d.narr, overnight:d.overnight,
    dayStart:d.dayStart||null, daylight:d.daylight||null,
    stops:d.stops.map(s=>({nm:s.nm, arrive:s.arrive||null, duration:(s.duration!=null?s.duration:0),
      driveToNext:(s.driveToNext!=null?s.driveToNext:null), kind:s.kind||null,
      ll:s.ll, note:s.note, noRoute:!!s.noRoute}))
  }));
  let gi=0;
  DAYS.forEach((d,di)=>d.stops.forEach((s,si)=>{
    s._idx=++gi; s._di=di; s._si=si; s._day=d.n; s._dayTotal=d.stops.length;
    const e=enrichment[s.nm];
    s.pd=(e&&e.pid)?{pid:e.pid,rating:e.rating,count:e.count,cat:e.cat}:null;
    s.photos=(e&&e.photos)?e.photos:[];
  }));
  FLAT=DAYS.flatMap(d=>d.stops);
  DAYS.forEach(d=>cascade(d));
}

/* ---- Time helpers ---- */
/* Parse "HH:MM" (24-hour, as stored in JSON) -> minutes since midnight. */
function hm(t){
  if(!t) return null;
  const m=String(t).match(/^(\d{1,2}):(\d{2})$/); if(!m) return null;
  return (+m[1])*60+(+m[2]);
}
/* Minutes since midnight -> "HH:MM" (24-hour) for storing back to JSON. */
function toHM(mins){
  mins=((Math.round(mins)%1440)+1440)%1440;
  const h=Math.floor(mins/60), mm=mins%60;
  return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
/* Minutes since midnight -> "12:30 PM" for the UI. */
function fmt12(mins){
  if(mins==null) return '';
  mins=((Math.round(mins)%1440)+1440)%1440;
  let h=Math.floor(mins/60); const mm=mins%60;
  const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12;
  return hh+':'+String(mm).padStart(2,'0')+' '+ap;
}
/* Duration in minutes -> "1h 20m" / "45 min". */
function fmtDur(mins){
  if(mins==null) return '';
  mins=Math.round(mins);
  if(mins<60) return mins+' min';
  const h=Math.floor(mins/60), mm=mins%60;
  return mm?h+'h '+mm+'m':h+' hr';
}
/* Drive minutes for the leg departing FROM stop s:
   prefer the live Google Directions leg (s._driveNext seconds), else stored
   driveToNext, else a fallback. Last stop of a day has no leg -> null. */
function driveMinFrom(s){
  const day=DAYS[s._di];
  if(s._si>=day.stops.length-1) return null;
  if(s._driveNext!=null) return Math.round(s._driveNext/60);
  if(s.driveToNext!=null) return s.driveToNext;
  return FALLBACK_DRIVE_MIN;
}
/* CASCADE ENGINE — authoritative.
   Given a day (dayStart + each stop's editable `duration` + per-leg drive time),
   recompute every stop's `arrive` (24-hour string + cached _arriveMin). The first
   stop arrives at dayStart; each subsequent arrival = prev arrival + prev duration
   + drive leg. Returns the day-end minute (last arrival + last duration). */
function cascade(day){
  let t=hm(day.dayStart);
  if(t==null && day.stops.length) t=hm(day.stops[0].arrive)||0;
  day.stops.forEach((s,i)=>{
    s._arriveMin=t;
    s.arrive=toHM(t);
    t+=(s.duration||0);
    const dm=driveMinFrom(s);
    if(dm!=null) t+=dm;
  });
  day._endMin=t; // after the last stop's duration (last stop has no drive leg)
  return t;
}
/* "time here" for a stop = its explicit duration. Last stop = wrap-up. */
function timeHere(s){
  const day=DAYS[s._di];
  const last=s._si===day.stops.length-1;
  if(last) return {mins:s.duration||0, last:true};
  return {mins:s.duration||0, drive:driveMinFrom(s)};
}

let map, pinEls={}, dayRenderers={}, dayDrive={};
let view={mode:'day-intro',day:1,stopIdx:null};
let curPhotos=[], curPhoto=0;

const DARK_STYLE=[
  {elementType:'geometry',stylers:[{color:'#1d2c3a'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#0b1a2b'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#c8d2dc'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#0b1a2b'}]},
  {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#16252f'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#3a4a57'}]},
  {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
  {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#e6ecf2'}]}
];

function gmapsPlaceUrl(s){
  if(s.pd&&s.pd.pid) return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.nm)+'&query_place_id='+s.pd.pid;
  return 'https://www.google.com/maps/search/?api=1&query='+s.ll[0]+','+s.ll[1];
}
function gmapsRouteUrl(day){
  const pts=day.stops.filter(s=>!s.noRoute);
  const wp=pts.map(s=>(s.pd&&s.pd.pid)?s.nm:s.ll[0]+','+s.ll[1]);
  const o=encodeURIComponent(wp[0]),d=encodeURIComponent(wp[wp.length-1]),m=wp.slice(1,-1).map(encodeURIComponent).join('|');
  let u='https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+d+'&travelmode=driving';
  if(m)u+='&waypoints='+m; return u;
}

let AdvancedHTML;
function defineOverlay(){
  AdvancedHTML=function(lat,lng,el){this.pos=new google.maps.LatLng(lat,lng);this.el=el;};
  AdvancedHTML.prototype=new google.maps.OverlayView();
  AdvancedHTML.prototype.onAdd=function(){this.getPanes().floatPane.appendChild(this.el);};
  AdvancedHTML.prototype.draw=function(){const p=this.getProjection().fromLatLngToDivPixel(this.pos);if(p){this.el.style.left=p.x+'px';this.el.style.top=p.y+'px';}};
  AdvancedHTML.prototype.onRemove=function(){if(this.el.parentNode)this.el.parentNode.removeChild(this.el);};
  AdvancedHTML.prototype.raise=function(){this.el.style.zIndex='50';};
  AdvancedHTML.prototype.lower=function(){this.el.style.zIndex='5';};
}

function initMap(){
  const g=google.maps;
  map=new g.Map(document.getElementById('map'),{
    center:{lat:64.05,lng:-19.4},zoom:7,styles:DARK_STYLE,
    disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',backgroundColor:'#0b1a2b'});

  FLAT.forEach(function(s){
    const el=document.createElement('div'); el.className='pin';
    el.innerHTML='<div class="thumb"></div><div class="badge">'+(s._si+1)+'</div>';
    if(s.photos[0]) el.querySelector('.thumb').style.backgroundImage='url('+s.photos[0]+')';
    el.addEventListener('click',function(ev){ev.stopPropagation();showStop(s._idx);});
    const ov=new AdvancedHTML(s.ll[0],s.ll[1],el); ov.setMap(map);
    pinEls[s._idx]={el:el,ov:ov,stop:s};
  });

  const ds=new g.DirectionsService();
  function straightFallback(day,pts){
    // Some stops are trailheads off-road; if Directions fails, draw a straight dashed line so a route always shows.
    const line=new g.Polyline({path:pts.map(s=>({lat:s.ll[0],lng:s.ll[1]})),map:null,
      strokeColor:'#4f9fff',strokeOpacity:0,
      icons:[{icon:{path:'M 0,-1 0,1',strokeColor:'#4f9fff',strokeOpacity:.9,scale:3},offset:'0',repeat:'12px'}]});
    dayRenderers[day.n]={setMap:function(m){line.setMap(m);}};
    if(view.day===day.n)line.setMap(map);
    if(view.mode==='day-intro'&&view.day===day.n)renderCard();
  }
  DAYS.forEach(function(day){
    const pts=day.stops.filter(s=>!s.noRoute); if(pts.length<2) return;
    ds.route({origin:{lat:pts[0].ll[0],lng:pts[0].ll[1]},
      destination:{lat:pts[pts.length-1].ll[0],lng:pts[pts.length-1].ll[1]},
      waypoints:pts.slice(1,-1).map(s=>({location:{lat:s.ll[0],lng:s.ll[1]},stopover:true})),
      travelMode:g.TravelMode.DRIVING},function(res,st){
        if(st!=='OK'){ straightFallback(day,pts); return; }
        let secs=0, legs=[]; res.routes[0].legs.forEach(l=>{secs+=l.duration.value;legs.push(l.duration.value);});
        dayDrive[day.n]=secs/3600;
        // Map each leg's drive seconds onto the stop it departs FROM (skip noRoute stops).
        const routedStops=day.stops.filter(s=>!s.noRoute);
        routedStops.forEach((s,i)=>{ if(i<legs.length) s._driveNext=legs[i]; });
        cascade(day); // live drive times arrived — recompute arrivals for this day
        const rend=new g.DirectionsRenderer({map:null,directions:res,suppressMarkers:true,preserveViewport:true,
          polylineOptions:{strokeColor:'#4f9fff',strokeOpacity:.95,strokeWeight:4}});
        dayRenderers[day.n]=rend; if(view.day===day.n)rend.setMap(map);
        // Drive data just arrived for this day — refresh the card if we're viewing it (intro OR a stop).
        if(view.day===day.n)renderCard();
      });
  });

  buildTabs(); setDay(1);
}
window.initMap=initMap;

function buildTabs(){
  const el=document.getElementById('daytabs'); el.innerHTML='';
  DAYS.forEach(function(d){const b=document.createElement('button');b.className='daytab';b.textContent='Day '+d.n;b.dataset.day=d.n;b.onclick=function(){setDay(d.n);};el.appendChild(b);});
}
function syncTabs(){document.querySelectorAll('.daytab').forEach(b=>b.classList.toggle('active',+b.dataset.day===view.day));}

function setDay(n){
  view={mode:'day-intro',day:n,stopIdx:null}; syncTabs();
  Object.values(pinEls).forEach(p=>{p.el.style.display=(p.stop._day===n)?'block':'none';p.el.classList.remove('active');});
  Object.keys(dayRenderers).forEach(k=>dayRenderers[k].setMap(+k===n?map:null));
  fitDay(n); renderCard();
}
function fitDay(n){
  const pts=FLAT.filter(s=>s._day===n); if(!pts.length)return;
  const b=new google.maps.LatLngBounds(); pts.forEach(s=>b.extend({lat:s.ll[0],lng:s.ll[1]}));
  map.fitBounds(b,{top:80,right:Math.min(440,window.innerWidth*0.45)+30,bottom:60,left:60});
}
function showStop(idx){
  const s=FLAT.find(x=>x._idx===idx);
  view={mode:'stop',day:s._day,stopIdx:idx}; syncTabs();
  Object.values(pinEls).forEach(p=>{p.el.style.display=(p.stop._day===s._day)?'block':'none';
    const a=p.stop._idx===idx;p.el.classList.toggle('active',a);if(a)p.ov.raise();else p.ov.lower();});
  Object.keys(dayRenderers).forEach(k=>dayRenderers[k].setMap(+k===s._day?map:null));
  map.panTo({lat:s.ll[0],lng:s.ll[1]}); if(map.getZoom()<9)map.setZoom(10);
  renderCard();
}
function step(dir){
  if(view.mode==='day-intro'){ if(dir>0)showStop(DAYS[view.day-1].stops[0]._idx); else if(view.day>1){setDay(view.day-1);} return; }
  const s=FLAT.find(x=>x._idx===view.stopIdx), day=DAYS[s._di], np=s._si+dir;
  if(np<0){ if(view.day>1){setDay(view.day-1);showStop(DAYS[view.day-2].stops.slice(-1)[0]._idx);} return; }
  if(np>=day.stops.length){ if(view.day<DAYS.length)setDay(view.day+1); return; }
  showStop(day.stops[np]._idx);
}

function renderCard(){const card=document.getElementById('card');card.style.display='flex';if(view.mode==='day-intro')renderIntro(card);else renderStop(card);}

/* Sunrise/sunset readout for a day, plain text: "☀ Sunrise 3:07 AM · Sunset 11:54 PM". */
function daylightHtml(day){
  if(!day.daylight) return '';
  const sr=hm(day.daylight.sunrise), ss=hm(day.daylight.sunset);
  const parts=[];
  if(sr!=null) parts.push('Sunrise <strong>'+fmt12(sr)+'</strong>');
  if(ss!=null) parts.push('Sunset <strong>'+fmt12(ss)+'</strong>');
  if(!parts.length) return '';
  return '<div class="suntime">☀ '+parts.join(' · ')+'</div>';
}

function renderIntro(card){
  const day=DAYS[view.day-1];
  cascade(day);
  const drive=dayDrive[day.n]?('~'+dayDrive[day.n].toFixed(1)+' hrs driving'):'';
  let mini='';
  day.stops.forEach((s,i)=>{
    const th=timeHere(s);
    let stay='';
    if(th.mins!=null && !th.last){ stay=' · <span class="stay">'+fmtDur(th.mins)+' here</span>'; }
    else if(th.last && th.mins>0){ stay=' · <span class="stay">'+fmtDur(th.mins)+' here</span>'; }
    mini+='<div class="mini" data-idx="'+s._idx+'"><div class="mthumb" '+(s.photos[0]?'style="background-image:url('+s.photos[0]+')"':'')+'></div><div><div class="mt">'+fmt12(s._arriveMin)+stay+'</div><div class="mn">'+s.nm+'</div></div></div>';
    const driveMin=driveMinFrom(s);
    if(driveMin!=null && i<day.stops.length-1){ mini+='<div class="drivegap">🚗 '+fmtDur(driveMin)+' drive</div>'; }
  });
  card.innerHTML=
    '<div class="cb intro"><div class="meta">DAY '+day.n+'</div><div class="ttl">'+day.title+'</div>'+
      '<div class="narr">'+day.narr+'</div>'+
      daylightHtml(day)+
      '<a class="openroute" href="'+gmapsRouteUrl(day)+'" target="_blank" rel="noopener">➤ Open route</a>'+
      (drive?'<div class="drivepill">'+drive+'</div>':'')+'<div class="section-h">Stops</div>'+mini+'</div>'+
    footer();
  wireFooter();
  card.querySelectorAll('.mini').forEach(el=>el.onclick=function(){showStop(+el.dataset.idx);});
}

/* Plain inline time line on the stop card: "Arrive 5:02 PM · 31 min drive to next".
   Arrival is computed by cascade (durations come from trip.json, not editable). */
function timeStripHtml(s){
  const driveMin=driveMinFrom(s);
  let txt='Arrive <strong>'+fmt12(s._arriveMin)+'</strong>';
  if(driveMin!=null) txt+=' · '+fmtDur(driveMin)+' drive to next';
  return '<div class="timeline">'+txt+'</div>';
}

function renderStop(card){
  const s=FLAT.find(x=>x._idx===view.stopIdx), pd=s.pd;
  cascade(DAYS[s._di]);
  const rate=(pd&&pd.rating!=null)?('<span class="num">'+pd.rating+'</span> <span class="star">★</span> <span>('+(pd.count!=null?pd.count.toLocaleString():'—')+')</span>'+(pd.cat?' <span>· '+pd.cat+'</span>':'')):'';
  let imgs='',dots='';
  s.photos.forEach((u,i)=>{imgs+='<div class="img'+(i===0?' on':'')+'" style="background-image:url('+u+')"></div>';dots+='<div class="dot'+(i===0?' on':'')+'"></div>';});
  card.innerHTML=
    '<div class="ph" id="ph">'+imgs+
      '<button class="nav l" id="navl"></button><button class="nav r" id="navr"></button>'+
      '<button class="close" id="closeBtn">×</button><div class="dots" id="dots">'+dots+'</div></div>'+
    '<div class="cb"><div class="meta">Day '+s._day+' · '+fmt12(s._arriveMin)+'</div><div class="ttl">'+s.nm+'</div>'+
      (rate?'<div class="rate">'+rate+'</div>':'')+
      timeStripHtml(s)+
      '<div class="note"><div class="lbl">Notes from Claude</div><div class="txt">'+s.note+'</div></div>'+
      '<a class="gmlink" href="'+gmapsPlaceUrl(s)+'" target="_blank" rel="noopener">Open in Google Maps ↗</a></div>'+
    footer();
  wireFooter();
  document.getElementById('closeBtn').onclick=function(){setDay(s._day);};
  curPhotos=s.photos; curPhoto=0;
  document.getElementById('navl').onclick=function(){photoStep(-1);};
  document.getElementById('navr').onclick=function(){photoStep(1);};
}

function photoStep(dir){
  if(curPhotos.length<2)return;
  curPhoto=(curPhoto+dir+curPhotos.length)%curPhotos.length;
  document.getElementById('ph').querySelectorAll('.img').forEach((e,i)=>e.classList.toggle('on',i===curPhoto));
  document.getElementById('dots').querySelectorAll('.dot').forEach((e,i)=>e.classList.toggle('on',i===curPhoto));
}

function footer(){
  let left,count;
  if(view.mode==='day-intro'){
    left=view.day>1?'<button class="fbtn daybtn" id="prevBtn">‹ Day '+(view.day-1)+'</button>':'<button class="fbtn" id="prevBtn" disabled>‹</button>';
    count='Day '+view.day;
  }else{
    const s=FLAT.find(x=>x._idx===view.stopIdx), atFirst=s._si===0;
    if(atFirst&&view.day>1)left='<button class="fbtn daybtn" id="prevBtn">‹ Day '+(view.day-1)+'</button>';
    else left='<button class="fbtn" id="prevBtn"'+(atFirst&&view.day===1?' disabled':'')+'>‹</button>';
    count=(s._si+1)+' of '+s._dayTotal;
  }
  return '<div class="fnav">'+left+'<span class="fcount">'+count+'</span><button class="fbtn" id="nextBtn">›</button></div>';
}
function wireFooter(){
  const p=document.getElementById('prevBtn'),n=document.getElementById('nextBtn');
  if(p&&!p.disabled)p.onclick=function(){step(-1);}; if(n)n.onclick=function(){step(1);};
}

const API_KEY="AIzaSyCOKJB3c7_aopQPP1gaEoQ0g6NQ_M9K5Tg";

/* __start is the Maps JS callback; data is already loaded by the time it fires. */
window.__start=function(){defineOverlay();initMap();};

/* Boot: fetch trip.json + enrichment.json FIRST, build DAYS, THEN load Maps. */
async function boot(){
  try{
    const [trip,enrichment]=await Promise.all([
      fetch('trip.json').then(r=>{if(!r.ok)throw new Error('trip.json '+r.status);return r.json();}),
      fetch('enrichment.json').then(r=>r.ok?r.json():{}).catch(()=>({}))
    ]);
    buildData(trip,enrichment);
    if(TRIP_META&&TRIP_META.title)document.title=TRIP_META.title;
    /* Prefetch all images once into the browser cache. */
    const seen={}; FLAT.forEach(s=>s.photos.forEach(u=>{if(!seen[u]){seen[u]=1;const i=new Image();i.src=u;}}));
    const sc=document.createElement('script');
    sc.src='https://maps.googleapis.com/maps/api/js?key='+API_KEY+'&callback=__start&v=weekly&loading=async';
    sc.async=true; document.head.appendChild(sc);
  }catch(err){
    document.getElementById('map').innerHTML=
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa0a8;font-size:1rem;padding:2rem;text-align:center;">Failed to load trip data: '+err.message+'</div>';
    console.error(err);
  }
}
boot();
</script>
