<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland Ring Road — Trip Map · Aug 14–18</title>
<style>
  :root{
    --basalt:#0f1419; --card:#161b22; --bone:#eceae4; --bone-dim:#9aa0a8;
    --glacier:#7fb8d6; --aurora:#6fd39a; --star:#f5b942; --warn:#e0a45e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--basalt);color:var(--bone);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;}
  #map{position:absolute;inset:0;background:#0b1a2b;}

  .daytabs{position:absolute;z-index:30;top:18px;left:18px;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(58% - 36px);}
  .daytab{font-size:.92rem;font-weight:600;background:rgba(20,25,33,.78);color:var(--bone);
    border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:.5rem 1.1rem;cursor:pointer;
    backdrop-filter:blur(10px);transition:all .15s;white-space:nowrap;}
  .daytab:hover{background:rgba(40,48,58,.9);}
  .daytab.active{background:#f4f2ec;color:#11161c;border-color:#f4f2ec;}

  /* FIXED-GEOMETRY CARD: header(photo) + scrollable body + pinned footer */
  .card{position:absolute;z-index:30;top:18px;right:18px;
    width:min(420px,42vw); height:min(680px, calc(100vh - 36px - 100px));
    display:flex;flex-direction:column;
    background:rgba(22,27,34,.94);border:1px solid rgba(255,255,255,.08);border-radius:20px;
    backdrop-filter:blur(16px);box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden;}
  @media(max-width:760px){.card{width:calc(100vw - 28px);right:14px;left:14px;top:auto;bottom:14px;height:70vh;}
    .daytabs{max-width:calc(100% - 36px);}}

  /* photo banner — FIXED height so card never grows */
  .ph{position:relative;width:100%;height:236px;flex:none;background:#0e1318;overflow:hidden;}
  .ph .img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .35s;}
  .ph .img.on{opacity:1;}
  .ph .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:6px;justify-content:center;z-index:2;}
  .ph .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);transition:all .2s;}
  .ph .dot.on{background:#fff;width:7px;height:7px;}
  .ph .close{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border:none;cursor:pointer;
    border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:19px;line-height:32px;text-align:center;}
  .ph .nav{position:absolute;top:0;bottom:0;width:34%;z-index:2;cursor:pointer;background:transparent;border:none;}
  .ph .nav.l{left:0;} .ph .nav.r{right:0;}

  /* scrollable middle */
  .cb{flex:1 1 auto;padding:1.05rem 1.3rem 1.2rem;overflow-y:auto;min-height:0;}
  .cb::-webkit-scrollbar{width:6px;} .cb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}
  .meta{font-size:.78rem;letter-spacing:.04em;color:var(--bone-dim);text-transform:uppercase;}
  .ttl{font-size:1.5rem;font-weight:700;line-height:1.14;margin:.35rem 0 .5rem;letter-spacing:-.01em;}
  .rate{font-size:.95rem;color:var(--bone-dim);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .rate .num{color:var(--bone);font-weight:700;} .rate .star{color:var(--star);}
  .note{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:.85rem 1rem;margin-top:1rem;}
  .note .lbl{font-size:.82rem;color:var(--bone-dim);margin-bottom:.35rem;}
  .note .txt{font-size:.96rem;line-height:1.5;}
  .gmlink{display:block;text-align:right;margin-top:.7rem;font-size:.82rem;color:var(--glacier);text-decoration:none;}
  .gmlink:hover{text-decoration:underline;}

  /* plain inline time line on stop card + sunrise/sunset on day intro */
  .timeline{font-size:.86rem;color:var(--bone-dim);margin:.9rem 0 .2rem;}
  .timeline strong{color:var(--bone);font-weight:700;}
  .suntime{font-size:.86rem;color:var(--star);margin:.2rem 0 1rem;}
  .suntime strong{color:var(--bone);font-weight:700;}

  /* drive gap rows in the intro stop list */
  .drivegap{display:flex;align-items:center;gap:.5rem;padding:.25rem 0 .25rem 1.1rem;
    font-size:.78rem;color:var(--bone-dim);}
  .drivegap::before{content:"";width:2px;height:18px;background:rgba(255,255,255,.15);margin-left:25px;margin-right:.7rem;}
  .mt .stay{color:var(--aurora);} .mt .stay.tight{color:var(--warn);}

  .intro .narr{font-size:1.02rem;line-height:1.5;color:var(--bone-dim);margin:.6rem 0 1rem;}
  .openroute{display:inline-flex;align-items:center;gap:.5rem;background:#f4f2ec;color:#11161c;font-weight:700;
    font-size:.95rem;border:none;border-radius:999px;padding:.6rem 1.15rem;cursor:pointer;text-decoration:none;}
  .openroute:hover{background:#fff;}
  .drivepill{font-size:.84rem;color:var(--aurora);margin-top:.9rem;}
  .section-h{font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--bone-dim);margin:1.3rem 0 .2rem;}
  .mini{display:flex;gap:.8rem;align-items:center;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;}
  .mini:last-child{border-bottom:none;} .mini:hover .mn{color:var(--glacier);}
  .mini .mthumb{width:54px;height:54px;border-radius:11px;flex:none;background:#0e1318 center/cover;background-size:cover;}
  .mini .mt{font-size:.78rem;color:var(--bone-dim);} .mn{font-size:1rem;font-weight:600;line-height:1.2;}

  /* footer pinned, fixed height */
  .fnav{flex:none;height:64px;display:flex;align-items:center;justify-content:space-between;gap:.6rem;
    padding:0 1.1rem;border-top:1px solid rgba(255,255,255,.08);background:rgba(14,18,24,.8);}
  .fbtn{min-width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.13);
    background:rgba(255,255,255,.05);color:var(--bone);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;
    justify-content:center;padding:0 .9rem;font-weight:600;}
  .fbtn:hover{background:rgba(255,255,255,.12);} .fbtn:disabled{opacity:.3;cursor:default;}
  .fbtn.daybtn{font-size:.9rem;} .fcount{font-size:.95rem;color:var(--bone-dim);font-weight:700;}

  .pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;}
  .pin .thumb{width:46px;height:46px;border-radius:13px;border:2.5px solid #fff;background:#1c222b center/cover;
    background-size:cover;box-shadow:0 4px 12px rgba(0,0,0,.55);transition:all .15s;}
  .pin .badge{position:absolute;top:-9px;right:-9px;min-width:22px;height:22px;border-radius:999px;background:#fff;
    color:#11161c;font-size:.74rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;
    border:1.5px solid #11161c;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .pin.active .thumb{border-color:var(--aurora);width:54px;height:54px;}
  /* dot pin (no photo) — colored by kind */
  .pin .dotpin{width:20px;height:20px;border-radius:50%;border:2.5px solid #fff;background:#5b6670;
    box-shadow:0 3px 9px rgba(0,0,0,.55);transition:all .15s;}
  .pin.active .dotpin{width:26px;height:26px;border-color:var(--aurora);}

  /* richer stop-card fields */
  .factrow{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.85rem;}
  .pill{display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:600;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:.3rem .7rem;color:var(--bone);}
  .pill.cost{color:var(--aurora);}
  .book-must{display:inline-flex;align-items:center;gap:.4rem;font-size:.84rem;font-weight:800;letter-spacing:.03em;
    background:rgba(224,164,94,.16);border:1px solid var(--warn);color:var(--warn);border-radius:999px;padding:.34rem .8rem;}
  .book-rec{font-size:.8rem;color:var(--bone-dim);font-style:italic;}
  .booknote{font-size:.85rem;line-height:1.45;color:var(--bone-dim);margin-top:.45rem;
    background:rgba(255,255,255,.035);border-left:2px solid var(--warn);border-radius:0 8px 8px 0;padding:.5rem .7rem;}
  .parking{font-size:.86rem;line-height:1.45;color:var(--bone-dim);margin-top:.7rem;}
  .parking .pk{color:var(--bone);font-weight:600;}

  /* leg (drive) card */
  .legcard{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:2rem 1.5rem;text-align:center;}
  .legcard .legicon{font-size:2.6rem;margin-bottom:.6rem;}
  .legcard .legdur{font-size:2.4rem;font-weight:800;letter-spacing:-.02em;color:var(--glacier);line-height:1;}
  .legcard .leglbl{font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bone-dim);margin-top:.4rem;}
  .legcard .legnm{font-size:1.15rem;font-weight:700;margin-top:1.2rem;line-height:1.3;}
  .legcard .legnote{font-size:.95rem;line-height:1.5;color:var(--bone-dim);margin-top:1rem;max-width:340px;}

  /* full-chain day intro list */
  .chain{margin-top:.4rem;}
  .crow{display:flex;gap:.7rem;align-items:flex-start;padding:.5rem 0;cursor:pointer;position:relative;}
  .crow:hover .cnm{color:var(--glacier);}
  .crow .cdot{flex:none;width:13px;height:13px;border-radius:50%;margin-top:.18rem;border:2px solid rgba(255,255,255,.25);}
  .crow .cbody{flex:1 1 auto;min-width:0;}
  .crow .ctime{font-size:.74rem;color:var(--bone-dim);letter-spacing:.02em;}
  .crow .cnm{font-size:.98rem;font-weight:600;line-height:1.25;}
  .crow .cstay{font-size:.74rem;color:var(--aurora);}
  .crow.ckind-wake .cdot,.crow.ckind-sleep .cdot{box-shadow:0 0 0 3px rgba(154,134,214,.25);}
  .crow.endcap .cnm{font-weight:800;}
  /* drive connector rows */
  .driverow{display:flex;align-items:center;gap:.55rem;padding:.1rem 0 .1rem .35rem;
    font-size:.76rem;color:var(--bone-dim);cursor:pointer;}
  .driverow:hover{color:var(--glacier);}
  .driverow::before{content:"";width:2px;height:16px;background:rgba(255,255,255,.16);margin-left:5px;margin-right:.85rem;flex:none;}

  /* ===== BOTTOM 5-DAY TIMELINE ===== */
  /* GLASS timeline panel — floats like the cards (translucent, blurred, rounded) */
  #tl{position:absolute;z-index:40;left:18px;right:18px;bottom:18px;
    background:rgba(22,27,34,.78);border:1px solid rgba(255,255,255,.1);border-radius:20px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    box-shadow:0 18px 50px rgba(0,0,0,.5);padding:12px 18px 16px;user-select:none;}
  #tl .tlhead{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:8px;flex-wrap:wrap;}
  #tl .legend{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.72rem;color:var(--bone-dim);}
  #tl .legend span{display:inline-flex;align-items:center;gap:.35rem;}
  #tl .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
  #tl .tlnow{font-size:.78rem;color:var(--bone);font-weight:600;white-space:nowrap;}
  /* taller bar = bigger drag target; translucent glassy track */
  #tlbar{position:relative;height:44px;border-radius:12px;overflow:hidden;cursor:pointer;
    background:rgba(10,14,19,.55);border:1px solid rgba(255,255,255,.09);
    box-shadow:inset 0 1px 3px rgba(0,0,0,.4);touch-action:none;}
  #tlbar .dayband{position:absolute;top:0;bottom:0;pointer-events:none;z-index:0;}
  #tlbar .dayband.alt{background:rgba(255,255,255,.04);}
  #tlbar .seg{position:absolute;top:0;bottom:0;border-right:1px solid rgba(10,14,19,.5);z-index:1;opacity:.82;transition:opacity .15s;}
  #tlbar .seg.sel{opacity:1;filter:brightness(1.35) saturate(1.15);box-shadow:inset 0 0 0 2px rgba(255,255,255,.7);z-index:2;}
  /* day break: brighter full-height divider with a notch top + bottom */
  #tlbar .ddiv{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.6);z-index:4;pointer-events:none;
    box-shadow:0 0 5px rgba(255,255,255,.35);}
  #tlbar .ddiv::before,#tlbar .ddiv::after{content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;}
  #tlbar .ddiv::before{top:0;border-top:5px solid var(--bone);}
  #tlbar .ddiv::after{bottom:0;border-bottom:5px solid var(--bone);}
  #tlhead-row{position:relative;height:24px;margin-bottom:4px;font-size:.66rem;color:var(--bone-dim);}
  #tlhead-row .dlbl{position:absolute;top:0;text-align:center;white-space:nowrap;transform:translateX(-50%);line-height:1.1;}
  #tlhead-row .dlbl .dn{font-weight:700;color:var(--bone);letter-spacing:.04em;font-size:.72rem;}
  #tlhead-row .dlbl .dd{display:block;font-size:.6rem;color:var(--bone-dim);margin-top:1px;}
  /* playhead — thin line PLUS a big grabbable knob */
  #tlplay{position:absolute;top:-5px;bottom:-5px;width:3px;background:var(--bone);z-index:6;pointer-events:none;
    border-radius:2px;box-shadow:0 0 10px rgba(255,255,255,.6);}
  #tlplay .knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:26px;height:26px;border-radius:50%;background:var(--bone);
    box-shadow:0 3px 10px rgba(0,0,0,.55),0 0 0 4px rgba(255,255,255,.12);
    cursor:grab;pointer-events:auto;display:flex;align-items:center;justify-content:center;}
  #tlplay .knob::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--basalt);}
  #tlplay .knob:active{cursor:grabbing;}
  #tl.dragging #tlplay .knob{transform:translate(-50%,-50%) scale(1.18);box-shadow:0 4px 14px rgba(0,0,0,.6),0 0 0 6px rgba(127,184,214,.25);}
  .sleepspan{font-size:.9rem;color:#cbbff0;margin-top:.9rem;background:rgba(154,134,214,.1);
    border:1px solid rgba(154,134,214,.25);border-radius:12px;padding:.6rem .85rem;}
  .sleepspan strong{color:var(--bone);font-weight:700;}
  @media(max-width:760px){
    #tl{left:10px;right:10px;bottom:10px;padding:9px 12px 12px;border-radius:16px;}
    #tl .legend{display:none;}
    #tlbar{height:40px;}
    .card{bottom:calc(10px + 150px);height:calc(72vh - 150px);}
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="daytabs" id="daytabs"></div>
<div class="card" id="card" style="display:none;"></div>
<div id="tl" style="display:none;">
  <div class="tlhead"><div class="legend" id="tllegend"></div><div class="tlnow" id="tlnow"></div></div>
  <div id="tlhead-row"></div>
  <div id="tlbar"><div id="tlplay" style="left:0;"><div class="knob"></div></div></div>
</div>

<script>
/* Data is loaded at runtime from trip.json + enrichment.json (see boot() at bottom).
   These are populated before initMap runs. */
let DAYS=[], FLAT=[], TRIP_META=null;
const FALLBACK_DRIVE_MIN=45; // used only if neither live nor stored drive time is known

/* Build the in-memory DAYS structure the rest of the app expects from the two
   loaded JSON files. Maps enrichment onto each stop by name:
     s.pd = {pid,rating,count,cat} | null   (null = no place; rate banner hidden)
     s.photos = [local paths] | []          ([] = empty carousel banner) */
function buildData(trip, enrichment){
  TRIP_META=trip.meta||null;
  DAYS=trip.days.map(d=>({
    n:d.n, title:d.title, date:d.date, narr:d.narr, overnight:d.overnight,
    dayStart:d.dayStart||null, daylight:d.daylight||null,
    stops:d.stops.map(s=>({nm:s.nm, arrive:s.arrive||null, duration:(s.duration!=null?s.duration:0),
      driveToNext:(s.driveToNext!=null?s.driveToNext:null), kind:s.kind||null,
      ll:s.ll, note:s.note, noRoute:!!s.noRoute,
      cost:s.cost||null, book:s.book||null, bookNote:s.bookNote||null, parking:s.parking||null}))
  }));
  let gi=0;
  DAYS.forEach((d,di)=>d.stops.forEach((s,si)=>{
    s._idx=++gi; s._di=di; s._si=si; s._day=d.n; s._dayTotal=d.stops.length;
    const e=enrichment[s.nm];
    s.pd=(e&&e.pid)?{pid:e.pid,rating:e.rating,count:e.count,cat:e.cat}:null;
    s.photos=(e&&e.photos)?e.photos:[];
  }));
  FLAT=DAYS.flatMap(d=>d.stops);
  DAYS.forEach(d=>cascade(d));
}

/* ---- Time helpers ---- */
/* Parse "HH:MM" (24-hour, as stored in JSON) -> minutes since midnight. */
function hm(t){
  if(!t) return null;
  const m=String(t).match(/^(\d{1,2}):(\d{2})$/); if(!m) return null;
  return (+m[1])*60+(+m[2]);
}
/* Minutes since midnight -> "HH:MM" (24-hour) for storing back to JSON. */
function toHM(mins){
  mins=((Math.round(mins)%1440)+1440)%1440;
  const h=Math.floor(mins/60), mm=mins%60;
  return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
/* Minutes since midnight -> "12:30 PM" for the UI. */
function fmt12(mins){
  if(mins==null) return '';
  mins=((Math.round(mins)%1440)+1440)%1440;
  let h=Math.floor(mins/60); const mm=mins%60;
  const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12;
  return hh+':'+String(mm).padStart(2,'0')+' '+ap;
}
/* Duration in minutes -> "1h 20m" / "45 min". */
function fmtDur(mins){
  if(mins==null) return '';
  mins=Math.round(mins);
  if(mins<60) return mins+' min';
  const h=Math.floor(mins/60), mm=mins%60;
  return mm?h+'h '+mm+'m':h+' hr';
}
/* The drive leg that DEPARTS from place stop s is the next stop in the day if it's
   a kind:"drive" block. Returns that drive stop, or null. */
function driveStopAfter(s){
  const day=DAYS[s._di];
  const nx=day.stops[s._si+1];
  return (nx && nx.kind==='drive') ? nx : null;
}
/* Drive minutes for a kind:"drive" stop. In the new explicit chain the drive's own
   `duration` IS the leg time; live Google Directions (_driveLive seconds) overrides
   it once available. Non-drive stops have no leg -> null. */
function driveMin(s){
  if(!s || s.kind!=='drive') return null;
  if(s._driveLive!=null) return Math.round(s._driveLive/60);
  if(s.duration!=null) return s.duration;
  return FALLBACK_DRIVE_MIN;
}
/* CASCADE ENGINE — authoritative for the explicit chain.
   Drives are now EXPLICIT stops, so arrival is simply the running sum of every
   block's duration (live drive times, when present, replace a drive block's
   duration). First stop arrives at dayStart. Returns the day-end minute. */
function cascade(day){
  let t=hm(day.dayStart);
  if(t==null && day.stops.length) t=hm(day.stops[0].arrive)||0;
  day.stops.forEach(s=>{
    s._arriveMin=t;
    s.arrive=toHM(t);
    t+=(s.kind==='drive') ? (driveMin(s)||0) : (s.duration||0);
  });
  day._endMin=t;
  return t;
}
/* "time here" for a non-drive stop = its dwell duration. The drive leg that follows
   (if any) is reported alongside. Last stop of a day = wrap-up. */
function timeHere(s){
  const day=DAYS[s._di];
  const last=s._si===day.stops.length-1;
  const dr=driveStopAfter(s);
  if(last) return {mins:s.duration||0, last:true};
  return {mins:s.duration||0, drive:dr?driveMin(dr):null};
}

/* ---- Kind metadata: color (for timeline + dot pins), icon, label ---- */
const KIND={
  drive:    {color:'#5b6670', icon:'🚗', label:'Drive'},
  activity: {color:'#7fb8d6', icon:'📷', label:'Activity'},
  soak:     {color:'#6fd39a', icon:'♨️', label:'Soak'},
  meal:     {color:'#f5b942', icon:'🍴', label:'Meal'},
  logistics:{color:'#9aa0a8', icon:'•',  label:'Logistics'},
  sleep:    {color:'#9a86d6', icon:'🛌', label:'Sleep'}
};
function kmeta(s){ return KIND[s&&s.kind]||{color:'#9aa0a8',icon:'•',label:''}; }
/* A stop gets a map pin (and is on the route line) only if it's a real place:
   not a drive leg, not flagged noRoute, and has coordinates. */
function isPlace(s){ return !!(s && s.ll && s.kind!=='drive' && !s.noRoute); }
/* Length of a block on the timeline, in minutes: drives use their drive duration
   (its own `duration` is the leg time), everything else uses its dwell duration.
   The campground SLEEP block is special: its dwell duration is 0, but the night
   actually spans bed->wake (~9h), so we give it the real overnight length so it
   shows as a big block on the timeline. */
function blockMin(s){
  if(s.kind==='sleep'){
    // The night really spans ~9h (bed->wake), but at full scale it'd eat ~40% of the
    // day's draggable bar and squash the daytime stops. Cap its visual weight so the
    // sleep block is clearly present (a big chunk) without dominating the scrubber.
    return 200; // ~ the width of a long activity; the card still shows the true 9h
  }
  const m=s.duration||0; return m>0?m:(s.kind==='drive'?5:8);
}

let map, pinEls={}, dayRenderers={}, dayDrive={};
let view={mode:'day-intro',day:1,stopIdx:null};
let curPhotos=[], curPhoto=0;

const DARK_STYLE=[
  {elementType:'geometry',stylers:[{color:'#1d2c3a'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#0b1a2b'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#c8d2dc'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#0b1a2b'}]},

function gmapsPlaceUrl(s){
  if(s.pd&&s.pd.pid) return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.nm)+'&query_place_id='+s.pd.pid;
  return 'https://www.google.com/maps/search/?api=1&query='+s.ll[0]+','+s.ll[1];
}
function gmapsRouteUrl(day){
  const pts=day.stops.filter(isPlace);
  const wp=pts.map(s=>(s.pd&&s.pd.pid)?s.nm:s.ll[0]+','+s.ll[1]);
  const o=encodeURIComponent(wp[0]),d=encodeURIComponent(wp[wp.length-1]),m=wp.slice(1,-1).map(encodeURIComponent).join('|');
  let u='https://www.google.com/maps/dir/?api=1&origin='+o+'&destination='+d+'&travelmode=driving';
  if(m)u+='&waypoints='+m; return u;
}

let AdvancedHTML;
function defineOverlay(){
  AdvancedHTML=function(lat,lng,el){this.pos=new google.maps.LatLng(lat,lng);this.el=el;};
  AdvancedHTML.prototype=new google.maps.OverlayView();
  AdvancedHTML.prototype.onAdd=function(){this.getPanes().floatPane.appendChild(this.el);};
  AdvancedHTML.prototype.draw=function(){const p=this.getProjection().fromLatLngToDivPixel(this.pos);if(p){this.el.style.left=p.x+'px';this.el.style.top=p.y+'px';}};
  AdvancedHTML.prototype.onRemove=function(){if(this.el.parentNode)this.el.parentNode.removeChild(this.el);};
  AdvancedHTML.prototype.raise=function(){this.el.style.zIndex='50';};
  AdvancedHTML.prototype.lower=function(){this.el.style.zIndex='5';};
}

function initMap(){
  const g=google.maps;
  map=new g.Map(document.getElementById('map'),{
    center:{lat:64.05,lng:-19.4},zoom:7,styles:DARK_STYLE,
    disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',backgroundColor:'#0b1a2b'});

  // Number badges reflect position among the PINNED (place) stops within each day.
  DAYS.forEach(d=>{let pn=0; d.stops.forEach(s=>{ s._pinNo=isPlace(s)?(++pn):null; });});
  FLAT.forEach(function(s){
    if(!isPlace(s)) return; // no pin for drive legs, noRoute blocks, or stops without coords
    const el=document.createElement('div'); el.className='pin';
    if(s.photos[0]){
      el.innerHTML='<div class="thumb" style="background-image:url('+s.photos[0]+')"></div><div class="badge">'+s._pinNo+'</div>';
    }else{
      el.innerHTML='<div class="dotpin" style="background:'+kmeta(s).color+'"></div>';
    }
    el.addEventListener('click',function(ev){ev.stopPropagation();showStop(s._idx);});
    const ov=new AdvancedHTML(s.ll[0],s.ll[1],el); ov.setMap(map);
    pinEls[s._idx]={el:el,ov:ov,stop:s};
  });

  const ds=new g.DirectionsService();
  function straightFallback(day,pts){
    // Some stops are trailheads off-road; if Directions fails, draw a straight dashed line so a route always shows.
    const line=new g.Polyline({path:pts.map(s=>({lat:s.ll[0],lng:s.ll[1]})),map:null,
      strokeColor:'#4f9fff',strokeOpacity:0,
      icons:[{icon:{path:'M 0,-1 0,1',strokeColor:'#4f9fff',strokeOpacity:.9,scale:3},offset:'0',repeat:'12px'}]});
    dayRenderers[day.n]={setMap:function(m){line.setMap(m);}};
    if(view.day===day.n)line.setMap(map);
    if(view.mode==='day-intro'&&view.day===day.n)renderCard();
  }
  DAYS.forEach(function(day){
    const pts=day.stops.filter(isPlace); if(pts.length<2) return;
    ds.route({origin:{lat:pts[0].ll[0],lng:pts[0].ll[1]},
      destination:{lat:pts[pts.length-1].ll[0],lng:pts[pts.length-1].ll[1]},
      waypoints:pts.slice(1,-1).map(s=>({location:{lat:s.ll[0],lng:s.ll[1]},stopover:true})),
      travelMode:g.TravelMode.DRIVING},function(res,st){
        if(st!=='OK'){ straightFallback(day,pts); return; }
        let secs=0, legs=[]; res.routes[0].legs.forEach(l=>{secs+=l.duration.value;legs.push(l.duration.value);});
        dayDrive[day.n]=secs/3600;
        // Each Directions leg i connects place[i] -> place[i+1]; apply its live
        // seconds to the kind:"drive" block that departs from place[i].
        const routedStops=day.stops.filter(isPlace);
        routedStops.forEach((s,i)=>{ if(i<legs.length){ const dr=driveStopAfter(s); if(dr) dr._driveLive=legs[i]; } });
        cascade(day); // live drive times arrived — recompute arrivals for this day
        const rend=new g.DirectionsRenderer({map:null,directions:res,suppressMarkers:true,preserveViewport:true,
          polylineOptions:{strokeColor:'#4f9fff',strokeOpacity:.95,strokeWeight:4}});
        dayRenderers[day.n]=rend; if(view.day===day.n)rend.setMap(map);
        // Drive data just arrived for this day — refresh the card if we're viewing it (intro OR a stop).
        if(view.day===day.n)renderCard();
      });
  });

  buildTabs(); buildTimeline(); setDay(1);
}
window.initMap=initMap;

function buildTabs(){
  const el=document.getElementById('daytabs'); el.innerHTML='';
  DAYS.forEach(function(d){const b=document.createElement('button');b.className='daytab';b.textContent='Day '+d.n;b.dataset.day=d.n;b.onclick=function(){setDay(d.n);};el.appendChild(b);});
}
function syncTabs(){document.querySelectorAll('.daytab').forEach(b=>b.classList.toggle('active',+b.dataset.day===view.day));}

function setDay(n){
  view={mode:'day-intro',day:n,stopIdx:null}; syncTabs();
  Object.values(pinEls).forEach(p=>{p.el.style.display=(p.stop._day===n)?'block':'none';p.el.classList.remove('active');});
  Object.keys(dayRenderers).forEach(k=>dayRenderers[k].setMap(+k===n?map:null));
  fitDay(n); renderCard();
  // Move the timeline playhead to this day's first block.
  if(DAYS[n-1]&&DAYS[n-1].stops.length) syncTimeline(DAYS[n-1].stops[0]._idx);
}
function fitDay(n){
  const pts=FLAT.filter(s=>s._day===n); if(!pts.length)return;
  const b=new google.maps.LatLngBounds(); pts.forEach(s=>b.extend({lat:s.ll[0],lng:s.ll[1]}));
  map.fitBounds(b,{top:80,right:Math.min(440,window.innerWidth*0.45)+30,bottom:60,left:60});
}
/* Where to pan the map for a given stop. For a drive leg, pan to the leg's
   destination (the next place stop), falling back to the drive's own midpoint ll. */
function panLL(s){
  if(s.kind==='drive'){
    const day=DAYS[s._di];
    for(let j=s._si+1;j<day.stops.length;j++){ if(isPlace(day.stops[j])) return day.stops[j].ll; }
  }
  return s.ll;
}
function showStop(idx){
  const s=FLAT.find(x=>x._idx===idx);
  view={mode:'stop',day:s._day,stopIdx:idx}; syncTabs();
  // Highlight the matching place pin (drive legs highlight their destination pin).
  let hi=idx; if(s.kind==='drive'){ const day=DAYS[s._di]; for(let j=s._si+1;j<day.stops.length;j++){ if(isPlace(day.stops[j])){hi=day.stops[j]._idx;break;} } }
  Object.values(pinEls).forEach(p=>{p.el.style.display=(p.stop._day===s._day)?'block':'none';
    const a=p.stop._idx===hi;p.el.classList.toggle('active',a);if(a)p.ov.raise();else p.ov.lower();});
  Object.keys(dayRenderers).forEach(k=>dayRenderers[k].setMap(+k===s._day?map:null));
  const ll=panLL(s); map.panTo({lat:ll[0],lng:ll[1]}); if(map.getZoom()<9)map.setZoom(10);
  renderCard();
  syncTimeline(idx);
}
function step(dir){
  if(view.mode==='day-intro'){ if(dir>0)showStop(DAYS[view.day-1].stops[0]._idx); else if(view.day>1){setDay(view.day-1);} return; }
  const s=FLAT.find(x=>x._idx===view.stopIdx), day=DAYS[s._di], np=s._si+dir;
  if(np<0){ if(view.day>1){setDay(view.day-1);showStop(DAYS[view.day-2].stops.slice(-1)[0]._idx);} return; }
  if(np>=day.stops.length){ if(view.day<DAYS.length)setDay(view.day+1); return; }
  showStop(day.stops[np]._idx);
}

/* ===================== BOTTOM 5-DAY TIMELINE ===================== */
/* One continuous bar, equal width per day, segments proportional to each block's
   duration within its day. Drag/click moves a playhead that selects the stop under
   it and live-updates map + card. */
let TLSEG=[];        // [{idx, day, x0, w}]  (x0,w as fractions 0..1 of full bar)
let tlDayBounds=[];  // [{n, x0, x1}] fractional day spans
let tlSelIdx=null;
let tlDragging=false; // when true, the playhead follows the finger, not segment centers

function buildTimeline(){
  const nDays=DAYS.length; if(!nDays) return;
  const dayW=1/nDays;
  TLSEG=[]; tlDayBounds=[];
  DAYS.forEach((d,di)=>{
    const x0d=di*dayW;
    let total=0; d.stops.forEach(s=>total+=blockMin(s)); if(total<=0) total=1;
    tlDayBounds.push({n:d.n,x0:x0d,x1:x0d+dayW});
    let acc=0;
    d.stops.forEach(s=>{
      const frac=blockMin(s)/total;
      TLSEG.push({idx:s._idx, day:d.n, x0:x0d+acc*dayW, w:frac*dayW, stop:s});
      acc+=frac;
    });
  });
  // Render segments
  const bar=document.getElementById('tlbar');
  bar.querySelectorAll('.seg,.ddiv,.dayband').forEach(e=>e.remove());
  const play=document.getElementById('tlplay');
  // Alternating day-band backgrounds so each day reads as a distinct chunk
  DAYS.forEach((d,di)=>{
    const bd=document.createElement('div'); bd.className='dayband'+(di%2?' alt':'');
    bd.style.left=(di*dayW*100)+'%'; bd.style.width=(dayW*100)+'%';
    bar.insertBefore(bd,play);
  });
  TLSEG.forEach(seg=>{
    const el=document.createElement('div'); el.className='seg'; el.dataset.idx=seg.idx;
    el.style.left=(seg.x0*100)+'%'; el.style.width=(seg.w*100)+'%';
    el.style.background=kmeta(seg.stop).color;
    bar.insertBefore(el,play);
  });
  // Day dividers (between days) — strong breaks
  for(let i=1;i<nDays;i++){
    const dv=document.createElement('div'); dv.className='ddiv'; dv.style.left=(i*dayW*100)+'%';
    bar.insertBefore(dv,play);
  }
  // Day labels + date above the bar
  const hr=document.getElementById('tlhead-row'); hr.innerHTML='';
  DAYS.forEach((d,di)=>{
    const l=document.createElement('div'); l.className='dlbl';
    l.style.left=((di+0.5)*dayW*100)+'%';
    l.innerHTML='<span class="dn">Day '+d.n+'</span><span class="dd">'+(d.date||'')+'</span>';
    hr.appendChild(l);
  });
  // Legend
  const lg=document.getElementById('tllegend'); lg.innerHTML='';
  [['activity','Sights'],['soak','Soak'],['meal','Meal'],['drive','Drive'],['sleep','Sleep'],['logistics','Other']]
    .forEach(([k,lbl])=>{ lg.insertAdjacentHTML('beforeend',
      '<span><i style="background:'+KIND[k].color+'"></i>'+lbl+'</span>'); });
  document.getElementById('tl').style.display='block';
  wireTimelineDrag();
}

/* Move playhead + highlight the selected segment + update the "now" readout.
   Does NOT touch the map/card (callers handle that to avoid loops). */
function syncTimeline(idx){
  tlSelIdx=idx;
  const seg=TLSEG.find(g=>g.idx===idx); if(!seg) return;
  const bar=document.getElementById('tlbar'); if(!bar) return;
  if(!tlDragging){ const center=seg.x0+seg.w/2; document.getElementById('tlplay').style.left=(center*100)+'%'; }
  bar.querySelectorAll('.seg').forEach(e=>e.classList.toggle('sel',+e.dataset.idx===idx));
  const s=seg.stop;
  document.getElementById('tlnow').textContent='Day '+s._day+' · '+fmt12(s._arriveMin)+' · '+s.nm.replace(/^Drive:\s*/,'');
}

/* Hit-test a fractional x (0..1) to a segment idx. */
function segAtFrac(f){
  f=Math.max(0,Math.min(1,f));
  for(const g of TLSEG){ if(f>=g.x0 && f<g.x0+g.w) return g.idx; }
  return TLSEG.length?TLSEG[TLSEG.length-1].idx:null;
}
/* During drag we want continuous follow but cheap: only re-run showStop when the
   segment under the playhead actually changes; always glide the playhead itself. */
function dragTo(clientX){
  const bar=document.getElementById('tlbar'); const r=bar.getBoundingClientRect();
  const f=(clientX-r.left)/r.width;
  document.getElementById('tlplay').style.left=(Math.max(0,Math.min(1,f))*100)+'%';
  const idx=segAtFrac(f);
  if(idx!=null && idx!==tlSelIdx){ showStop(idx); } // showStop re-centers playhead on the segment + updates map+card
}
function wireTimelineDrag(){
  const bar=document.getElementById('tlbar');
  if(bar._wired) return; bar._wired=true;
  const tl=document.getElementById('tl');
  const start=e=>{ tlDragging=true; tl.classList.add('dragging'); bar.setPointerCapture(e.pointerId); dragTo(e.clientX); e.preventDefault(); };
  const end=()=>{ tlDragging=false; tl.classList.remove('dragging'); if(tlSelIdx!=null) syncTimeline(tlSelIdx); /* snap to segment center on release */ };
  bar.addEventListener('pointerdown',start);
  bar.addEventListener('pointermove',e=>{ if(tlDragging) dragTo(e.clientX); });
  bar.addEventListener('pointerup',end);
  bar.addEventListener('pointercancel',end);
}

    sc.src='https://maps.googleapis.com/maps/api/js?key='+API_KEY+'&callback=__start&v=weekly&loading=async';
    sc.async=true; document.head.appendChild(sc);
  }catch(err){
    document.getElementById('map').innerHTML=
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa0a8;font-size:1rem;padding:2rem;text-align:center;">Failed to load trip data: '+err.message+'</div>';
    console.error(err);
  }
}
boot();
</script>
